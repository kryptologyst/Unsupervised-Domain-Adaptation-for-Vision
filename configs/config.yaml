# @package _global_

defaults:
  - _self_
  - model: dann
  - data: toy_dataset
  - training: default

# Experiment settings
experiment_name: "domain_adaptation_experiment"
seed: 42
device: auto  # auto, cuda, mps, cpu

# Logging
logging:
  level: INFO
  log_file: null
  use_wandb: false
  wandb_project: "domain_adaptation"
  wandb_entity: null

# Paths
paths:
  data_dir: "data"
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
  asset_dir: "assets"

# Model architecture
model:
  backbone: "resnet50"  # resnet18, resnet50
  pretrained: true
  freeze_backbone: false
  num_classes: 10
  dropout: 0.5

# Data settings
data:
  batch_size: 32
  num_workers: 4
  image_size: 224
  augmentation: true
  num_source_samples: 1000
  num_target_samples: 1000
  num_classes: 10

# Training settings
training:
  max_epochs: 100
  learning_rate: 1e-4
  weight_decay: 1e-5
  lr_step_size: 30
  lr_gamma: 0.1
  lambda_domain: 1.0
  lambda_coral: 1.0

# Evaluation settings
evaluation:
  save_predictions: true
  create_visualizations: true
  compute_alignment_metrics: true
